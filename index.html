<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RO’Lyfe Acquisition Engine</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="container">
  <header class="hero">
    <h1>🏠 RO’Lyfe Acquisition Engine</h1>
    <p>Lead → Analyze → Offer → Fund → Close</p>
  </header>

<!-- HERO IMAGE -->
<section class="section hero-image">
  <img src="rolyfe-acquisition-hero.png" class="hero-banner">
</section>

<!-- ROOT OF LYFE VIDEO -->
<section class="section">
  <h3>🎬 Root Of Lyfe Holdings</h3>

  <video controls playsinline width="100%" class="videoBox">
    <source src="rootoflyfe-holding.mp4" type="video/mp4">
  </video>
</section>

<!-- CREDIT VIDEO -->
<section class="section">
  <h3>💳 Credit & Funding</h3>

  <video controls playsinline width="100%" class="videoBox">
    <source src="credit.mp4" type="video/mp4">
  </video>
</section>
  
  <section class="section">
    <h3>🧲 Lead Engine</h3>
    <textarea id="leadInput" placeholder="Paste addresses, one per line..."></textarea>
    <button onclick="importLeads()">Import Leads</button>
    <button onclick="autoGenerateLeads()">Auto Load Leads</button>
  </section>

  <section class="section">
    <h3>➕ Add Deal</h3>
    <input id="addr" placeholder="Property Address">
    <input id="price" type="number" placeholder="Purchase Price">
    <input id="arv" type="number" placeholder="ARV">
    <input id="rehab" type="number" placeholder="Rehab Estimate">
    <input id="assignment" type="number" placeholder="Assignment Fee">
    <input id="img" placeholder="Image URL optional">
    <button onclick="addDeal()">Add Deal</button>
  </section>

  <section class="section">
    <h3>🔥 Activity Feed</h3>
    <div id="feedBox"></div>
  </section>

  <section class="section">
    <h3>🏠 Deals</h3>
    <div id="deals"></div>
  </section>

  <section class="section">
    <h3>📊 Pipeline</h3>
    <div class="pipeline">
      <div class="col" id="leadCol"><h4>Leads</h4></div>
      <div class="col" id="analysisCol"><h4>Analyzing</h4></div>
      <div class="col" id="offerCol"><h4>Offer</h4></div>
      <div class="col" id="fundingCol"><h4>Funding</h4></div>
      <div class="col" id="closedCol"><h4>Closed</h4></div>
    </div>
  </section>

  <section class="section">
    <h3>💼 Investor Deals</h3>
    <div id="investorDeals"></div>
  </section>

  <section class="section">
    <h3>📊 Deal Calculator</h3>
    <button onclick="toggleCalc()">Open / Close Calculator</button>
    <div id="calcBox" class="hidden">
      <iframe src="https://rolrichman.github.io/ROLyfe-Overage-Calculator/"></iframe>
    </div>
  </section>

  <section class="section">
    <h3>🌐 RO’Lyfe Execution Links</h3>
    <a href="https://privatemoneyexchange.com/aff-page/richman/" target="_blank"><button class="red">Get Funding</button></a>
    <a href="https://rolrichman.github.io/rolyfe-contract-documents-hub/" target="_blank"><button>Contract Hub</button></a>
    <a href="https://agent.jotform.com/019bdd1fe57172838101dccf3612b1e9e787" target="_blank"><button>Open Jamal AI</button></a>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
