<div id="app">

  <!-- HEADER -->
  <div class="header">
    <h1>RO’Lyfe Real Estate OS 🏠</h1>
    <p>Acquire • Analyze • Close</p>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h2>Get a Cash Offer in 60 Seconds</h2>
    <button onclick="scrollToSection('calculator')">Start Deal Analysis</button>
  </div>

  <!-- LIVE DEAL FEED -->
  <div class="section">
    <h3>🔥 Live Deal Feed</h3>
    <div id="dealFeed"></div>
  </div>

  <!-- PROPERTY SHOWCASE -->
  <div class="section">
    <h3>🏠 Featured Properties</h3>
    <div class="carousel" id="carousel">
      <img src="https://source.unsplash.com/600x400/?house" />
      <img src="https://source.unsplash.com/600x400/?real-estate" />
      <img src="https://source.unsplash.com/600x400/?luxury-home" />
    </div>
  </div>

  <!-- DEAL ANALYZER -->
  <div class="section" id="calculator">
    <h3>📊 Deal Analyzer</h3>

    <input id="arv" placeholder="ARV ($)" type="number">
    <input id="repairs" placeholder="Repairs ($)" type="number">
    <input id="fees" placeholder="Fees ($)" type="number">

    <button onclick="calcDeal()">Analyze Deal</button>

    <div id="result"></div>
  </div>

  <!-- OFFER SYSTEM -->
  <div class="section">
    <h3>🧾 Generate Offer</h3>

    <button id="openCalc">Open Offer & Calculator</button>

    <div id="embedContainer">
      <iframe src="https://rolrichman.github.io/ROLyfe-Overage-Calculator/"></iframe>
    </div>
  </div>

  <!-- SELLER INTAKE -->
  <div class="section">
    <h3>📥 Seller Intake</h3>

    <button onclick="openModal('https://form.jotform.com/253154859148062')">
      Submit Property
    </button>

    <button onclick="openModal('https://agent.jotform.com/019481997fbe793382f010b5f7f063eea634')">
      Talk to AI Agent
    </button>
  </div>

  <!-- MODAL -->
  <div id="modal">
    <span onclick="closeModal()">✕</span>
    <iframe id="modalFrame"></iframe>
  </div>

</div>

<style>

/* BASE */
body {
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:#fff;
}

#app {
  max-width:1100px;
  margin:auto;
}

/* HEADER */
.header {
  text-align:center;
  padding:20px;
}

/* HERO */
.hero {
  text-align:center;
  padding:40px 20px;
}

.hero button {
  padding:12px 25px;
  border:none;
  border-radius:8px;
  background:#1D3557;
  color:#fff;
  cursor:pointer;
}

/* SECTIONS */
.section {
  padding:20px;
  margin:20px 0;
  background:#111733;
  border-radius:12px;
}

/* CAROUSEL */
.carousel {
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.carousel img {
  width:300px;
  border-radius:10px;
}

/* INPUTS */
input {
  display:block;
  margin:10px 0;
  padding:10px;
  width:100%;
  border-radius:6px;
  border:none;
}

/* BUTTONS */
button {
  margin:10px 5px;
  padding:10px 20px;
  border:none;
  border-radius:6px;
  background:#1D3557;
  color:white;
  cursor:pointer;
}

/* DEAL FEED */
#dealFeed div {
  padding:8px;
  border-bottom:1px solid #333;
}

/* EMBED SLIDE */
#embedContainer {
  height:0;
  overflow:hidden;
  transition:height 0.5s ease;
}

#embedContainer iframe {
  width:100%;
  height:800px;
  border:none;
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000;
  z-index:9999;
}

#modal iframe {
  width:100%;
  height:100%;
}

#modal span {
  position:absolute;
  top:10px;
  right:20px;
  font-size:30px;
  cursor:pointer;
}

</style>

<script>

/* =========================
   DEAL CALCULATOR
========================= */
function calcDeal(){
  let arv = +document.getElementById('arv').value || 0;
  let repairs = +document.getElementById('repairs').value || 0;
  let fees = +document.getElementById('fees').value || 0;

  let maxOffer = (arv * 0.63) - repairs - fees;

  document.getElementById('result').innerText =
    "Max Offer: $" + maxOffer.toFixed(0);
}

/* =========================
   LIVE DEAL FEED
========================= */
const deals = [
  "🟢 Philly - $120K ARV $220K",
  "🔥 Jersey - Under Market Deal",
  "⚡ Sold in 3 Hours",
  "📈 Investor Reviewing Offer"
];

setInterval(()=>{
  let d = deals[Math.floor(Math.random()*deals.length)];
  let el = document.createElement('div');
  el.innerText = d;
  document.getElementById('dealFeed').prepend(el);
},3000);

/* =========================
   EMBED TOGGLE
========================= */
const btn = document.getElementById('openCalc');
const embed = document.getElementById('embedContainer');
let open=false;

btn.onclick=()=>{
  embed.style.height = open ? '0' : '820px';
  open = !open;
};

/* =========================
   MODAL
========================= */
function openModal(url){
  document.getElementById('modal').style.display='block';
  document.getElementById('modalFrame').src=url;
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}

function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

</script>
