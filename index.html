<div id="app">

<!-- HEADER -->
<div class="header">
  <h1>RO’Lyfe Real Estate OS 🏠</h1>
  <p>Acquire • Analyze • Close</p>
</div>

<!-- HERO -->
<div class="hero">
  <h2>Deal Command Center</h2>
  <button onclick="scrollToSection('addDeal')">Add New Deal</button>
</div>

<!-- DEAL FEED -->
<div class="section">
  <h3>🔥 Live Activity</h3>
  <div id="feedBox"><div id="feed"></div></div>
</div>

<!-- ADD DEAL -->
<div class="section" id="addDeal">
  <h3>➕ Add Property Deal</h3>

  <input id="addr" placeholder="Address">
  <input id="price" placeholder="Purchase Price">
  <input id="arv" placeholder="ARV">
  <input id="img" placeholder="Image URL (optional)">

  <button onclick="addDeal()">Add Deal</button>
</div>

<!-- PROPERTY LIST -->
<div class="section">
  <h3>🏠 Your Deals</h3>
  <div id="deals"></div>
</div>

<!-- PIPELINE -->
<div class="section">
  <h3>📊 Deal Pipeline</h3>

  <div class="pipeline">
    <div class="col" id="leadCol"><h4>Leads</h4></div>
    <div class="col" id="analysisCol"><h4>Analyzing</h4></div>
    <div class="col" id="offerCol"><h4>Offer Sent</h4></div>
    <div class="col" id="closedCol"><h4>Closed</h4></div>
  </div>
</div>

</div>

<style>

/* BASE */
body{margin:0;font-family:Arial;background:#0b0f1a;color:white;}
#app{max-width:1100px;margin:auto;padding:10px;}

.header{text-align:center;}
.hero{text-align:center;margin:20px;}

.section{
  background:#111733;
  padding:15px;
  margin:15px 0;
  border-radius:10px;
}

/* INPUTS */
input{
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  border-radius:6px;
}

/* BUTTON */
button{
  padding:10px 20px;
  border:none;
  border-radius:6px;
  background:#1D3557;
  color:white;
  cursor:pointer;
}

/* FEED */
#feedBox{max-height:180px;overflow:hidden;background:#0b0f1a;padding:10px;border-radius:8px;}
#feed div{font-size:13px;padding:4px;border-bottom:1px solid #222;}

/* DEAL CARDS */
.card{
  background:#0b0f1a;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:6px;
}

/* PIPELINE */
.pipeline{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.col{
  min-width:200px;
  background:#0b0f1a;
  padding:10px;
  border-radius:8px;
}

.col h4{text-align:center;}

/* MOBILE */
@media(max-width:600px){
  button{width:100%;}
}

</style>

<script>

/* STORAGE */
let deals = JSON.parse(localStorage.getItem("deals")) || [];

/* ADD DEAL */
function addDeal(){
  let d = {
    addr: addr.value,
    price: price.value,
    arv: arv.value,
    img: img.value || "https://images.unsplash.com/photo-1560185007-cde436f6a4d0",
    stage: "lead"
  };

  deals.push(d);
  save();
  render();
  feedMsg("🟢 New Deal Added: " + d.addr);
}

/* SAVE */
function save(){
  localStorage.setItem("deals", JSON.stringify(deals));
}

/* RENDER */
function render(){

  document.getElementById("deals").innerHTML = "";

  // clear pipeline
  leadCol.innerHTML="<h4>Leads</h4>";
  analysisCol.innerHTML="<h4>Analyzing</h4>";
  offerCol.innerHTML="<h4>Offer Sent</h4>";
  closedCol.innerHTML="<h4>Closed</h4>";

  deals.forEach((d,i)=>{

    let el = document.createElement("div");
    el.className="card";

    el.innerHTML = `
      <img src="${d.img}">
      <b>${d.addr}</b><br>
      Buy: $${d.price} | ARV: $${d.arv}<br>

      <button onclick="move(${i},'analysis')">Analyze</button>
      <button onclick="move(${i},'offer')">Offer</button>
      <button onclick="move(${i},'closed')">Close</button>
    `;

    document.getElementById("deals").appendChild(el);

    // PIPELINE
    let small = el.cloneNode(true);

    if(d.stage==="lead") leadCol.appendChild(small);
    if(d.stage==="analysis") analysisCol.appendChild(small);
    if(d.stage==="offer") offerCol.appendChild(small);
    if(d.stage==="closed") closedCol.appendChild(small);

  });
}

/* MOVE STAGES */
function move(i,stage){
  deals[i].stage = stage;
  save();
  render();

  feedMsg("📊 Deal moved to " + stage.toUpperCase());
}

/* FEED */
function feedMsg(msg){
  let el = document.createElement("div");
  el.innerText = msg;
  feed.prepend(el);

  if(feed.children.length>10){
    feed.removeChild(feed.lastChild);
  }
}

/* AUTO FEED */
setInterval(()=>{
  let msgs = ["📈 Investor viewing","⚡ Deal heating up","🔥 High interest","💰 Offer incoming"];
  feedMsg(msgs[Math.floor(Math.random()*msgs.length)]);
},4000);

/* INIT */
render();

function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

  </script>
